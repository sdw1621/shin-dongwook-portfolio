<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>이력 관리 · 신동욱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard','sans-serif'] }, colors: { brand: { DEFAULT: '#2563eb' } } } } }
    </script>
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen">

    <!-- 설정 필요 배너 -->
    <div id="cfgBanner" class="hidden bg-amber-50 border-b border-amber-200 text-amber-800 text-sm px-6 py-3 text-center">
        ⚙️ <b>config.js</b> 에 Supabase 주소와 anon key 를 입력해야 작동합니다.
    </div>

    <!-- 로그인 -->
    <div id="loginView" class="hidden min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-2xl">🔐</span>
                <h1 class="text-xl font-extrabold">이력 관리자</h1>
            </div>
            <p class="text-sm text-gray-500 mb-6">신동욱 강사 포트폴리오 · 경력 DB 관리</p>
            <form id="loginForm" class="space-y-3">
                <input id="email" type="email" required placeholder="이메일" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm">
                <input id="password" type="password" required placeholder="비밀번호" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm">
                <button type="submit" class="w-full py-3 bg-gray-900 text-white rounded-xl font-semibold hover:bg-gray-800 transition">로그인</button>
            </form>
            <p id="loginErr" class="hidden mt-3 text-sm text-red-600"></p>
        </div>
    </div>

    <!-- 앱 -->
    <div id="appView" class="hidden max-w-5xl mx-auto px-5 py-8">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-extrabold">📋 이력 관리</h1>
                <p class="text-sm text-gray-500 mt-0.5">추가·수정·삭제하면 <a href="experience.html" target="_blank" class="text-brand underline">주요 이력 페이지</a>에 바로 반영됩니다.</p>
            </div>
            <div class="flex items-center gap-3 text-sm">
                <span id="userEmail" class="text-gray-400"></span>
                <button id="logoutBtn" class="px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50 transition">로그아웃</button>
            </div>
        </header>

        <!-- 입력 폼 -->
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 mb-8">
            <h2 id="formTitle" class="font-bold mb-4">새 이력 추가</h2>
            <form id="careerForm" class="grid md:grid-cols-2 gap-4">
                <input type="hidden" id="editId">
                <label class="block"><span class="text-xs font-semibold text-gray-500">기간</span>
                    <input id="f_period" placeholder="예: 2025.08" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm"></label>
                <label class="block"><span class="text-xs font-semibold text-gray-500">기관/기업 <span class="text-red-500">*</span></span>
                    <input id="f_org" required placeholder="예: 삼성전자 (구미)" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm"></label>
                <label class="block md:col-span-2"><span class="text-xs font-semibold text-gray-500">과정/주제</span>
                    <input id="f_title" placeholder="예: 머신러닝 · 파워쿼리 실무과정" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm"></label>
                <label class="block md:col-span-2"><span class="text-xs font-semibold text-gray-500">상세 설명</span>
                    <textarea id="f_desc" rows="2" placeholder="한두 줄 설명" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm"></textarea></label>
                <label class="block"><span class="text-xs font-semibold text-gray-500">카테고리</span>
                    <select id="f_cat" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm bg-white">
                        <option>대기업·금융</option><option>정부·공공기관</option><option>대학·교육</option><option selected>기타</option>
                    </select></label>
                <label class="block"><span class="text-xs font-semibold text-gray-500">배지 약칭</span>
                    <input id="f_badge" placeholder="예: SNU (없으면 비워두기)" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm"></label>
                <label class="block"><span class="text-xs font-semibold text-gray-500">배지 색상</span>
                    <select id="f_color" class="mt-1 w-full px-3 py-2.5 rounded-xl border border-gray-200 outline-none focus:border-brand text-sm bg-white">
                        <option value="from-blue-600 to-indigo-700">파랑</option>
                        <option value="from-emerald-500 to-green-600">초록</option>
                        <option value="from-violet-500 to-purple-600">보라</option>
                        <option value="from-teal-500 to-cyan-600">청록</option>
                        <option value="from-slate-700 to-slate-900">차콜</option>
                        <option value="from-rose-500 to-red-500">로즈</option>
                        <option value="from-amber-500 to-orange-600">앰버</option>
                        <option value="from-sky-600 to-blue-700">하늘</option>
                    </select></label>
                <div class="flex items-center gap-6">
                    <label class="flex items-center gap-2 text-sm"><input id="f_featured" type="checkbox" class="w-4 h-4"> <span class="font-semibold text-gray-600">대표 이력으로 강조</span></label>
                    <label class="flex items-center gap-2 text-sm"><span class="text-xs font-semibold text-gray-500">정렬</span><input id="f_sort" type="number" value="0" class="w-20 px-2 py-1.5 rounded-lg border border-gray-200 text-sm"></label>
                </div>
                <div class="md:col-span-2 flex gap-2">
                    <button type="submit" class="px-6 py-3 bg-brand text-white rounded-xl font-semibold hover:bg-blue-700 transition">저장</button>
                    <button type="button" id="cancelEdit" class="hidden px-5 py-3 rounded-xl border border-gray-200 hover:bg-gray-50 transition">취소</button>
                    <span id="saveMsg" class="self-center text-sm text-green-600"></span>
                </div>
            </form>
        </div>

        <!-- 목록 -->
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 class="font-bold">등록된 이력 <span id="count" class="text-gray-400 font-medium"></span></h2>
                <button id="refreshBtn" class="text-sm text-gray-500 hover:text-black">↻ 새로고침</button>
            </div>
            <div id="list" class="divide-y divide-gray-50"></div>
            <div id="emptyMsg" class="hidden px-6 py-10 text-center text-gray-400 text-sm">아직 등록된 이력이 없습니다. 위에서 추가해 보세요.</div>
        </div>
    </div>

    <script>
    (function () {
        const cfg = window.SUPABASE_CONFIG || {};
        const configured = cfg.url && cfg.anonKey && !cfg.url.includes("PASTE_");
        const $ = (id) => document.getElementById(id);
        let sb = null;

        if (!configured) {
            $("cfgBanner").classList.remove("hidden");
            $("loginView").classList.remove("hidden");
            $("loginErr").textContent = "먼저 config.js 설정이 필요합니다.";
            $("loginErr").classList.remove("hidden");
            return;
        }
        sb = window.supabase.createClient(cfg.url, cfg.anonKey);

        const CATS = ["대기업·금융","정부·공공기관","대학·교육","기타"];

        async function refreshSession() {
            const { data } = await sb.auth.getSession();
            if (data.session) showApp(data.session.user); else showLogin();
        }
        function showLogin(){ $("loginView").classList.remove("hidden"); $("appView").classList.add("hidden"); }
        function showApp(user){
            $("loginView").classList.add("hidden");
            $("appView").classList.remove("hidden");
            $("userEmail").textContent = user.email;
            loadCareers();
        }

        $("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            $("loginErr").classList.add("hidden");
            const { error } = await sb.auth.signInWithPassword({ email: $("email").value, password: $("password").value });
            if (error) { $("loginErr").textContent = "로그인 실패: " + error.message; $("loginErr").classList.remove("hidden"); }
            else refreshSession();
        });
        $("logoutBtn").addEventListener("click", async () => { await sb.auth.signOut(); showLogin(); });

        function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

        async function loadCareers() {
            const { data, error } = await sb.from("careers").select("*").order("sort_order", {ascending:false}).order("created_at", {ascending:false});
            const list = $("list");
            if (error) { list.innerHTML = '<div class="px-6 py-6 text-red-600 text-sm">불러오기 오류: '+esc(error.message)+'</div>'; return; }
            $("count").textContent = "(" + data.length + ")";
            $("emptyMsg").classList.toggle("hidden", data.length>0);
            list.innerHTML = data.map(r => `
                <div class="px-6 py-4 flex items-start gap-4 hover:bg-gray-50">
                    <div class="w-11 h-11 shrink-0 rounded-xl bg-gradient-to-br ${esc(r.color)||'from-blue-600 to-indigo-700'} flex items-center justify-center text-white font-extrabold text-xs">${esc(r.badge)||(esc(r.org)||'').slice(0,2)}</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold">${esc(r.org)}</span>
                            ${r.featured?'<span class="text-[10px] font-bold text-violet-700 bg-violet-100 px-1.5 py-0.5 rounded-full">대표</span>':''}
                            <span class="text-xs text-gray-400">${esc(r.period)||''}</span>
                            <span class="text-[10px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded-full">${esc(r.category)||'기타'}</span>
                        </div>
                        <div class="text-sm text-brand font-medium mt-0.5">${esc(r.title)||''}</div>
                        <div class="text-xs text-gray-500 mt-0.5">${esc(r.description)||''}</div>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <button data-edit="${r.id}" class="px-3 py-1.5 text-xs rounded-lg border border-gray-200 hover:bg-white">수정</button>
                        <button data-del="${r.id}" class="px-3 py-1.5 text-xs rounded-lg border border-red-200 text-red-600 hover:bg-red-50">삭제</button>
                    </div>
                </div>`).join("");
            list.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => startEdit(data.find(x=>x.id===b.dataset.edit)));
            list.querySelectorAll("[data-del]").forEach(b => b.onclick = () => del(b.dataset.del));
            window._careers = data;
        }

        function startEdit(r){
            $("editId").value = r.id;
            $("f_period").value = r.period||""; $("f_org").value = r.org||""; $("f_title").value = r.title||"";
            $("f_desc").value = r.description||""; $("f_cat").value = CATS.includes(r.category)?r.category:"기타";
            $("f_badge").value = r.badge||""; $("f_color").value = r.color||"from-blue-600 to-indigo-700";
            $("f_featured").checked = !!r.featured; $("f_sort").value = r.sort_order||0;
            $("formTitle").textContent = "이력 수정"; $("cancelEdit").classList.remove("hidden");
            window.scrollTo({top:0, behavior:"smooth"});
        }
        function resetForm(){
            $("careerForm").reset(); $("editId").value=""; $("f_sort").value=0;
            $("formTitle").textContent = "새 이력 추가"; $("cancelEdit").classList.add("hidden");
        }
        $("cancelEdit").onclick = resetForm;

        $("careerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const row = {
                period: $("f_period").value.trim(), org: $("f_org").value.trim(), title: $("f_title").value.trim(),
                description: $("f_desc").value.trim(), category: $("f_cat").value, badge: $("f_badge").value.trim(),
                color: $("f_color").value, featured: $("f_featured").checked, sort_order: parseInt($("f_sort").value)||0
            };
            const id = $("editId").value;
            let res;
            if (id) res = await sb.from("careers").update(row).eq("id", id);
            else res = await sb.from("careers").insert([row]);
            if (res.error) { alert("저장 오류: " + res.error.message); return; }
            $("saveMsg").textContent = id ? "수정되었습니다 ✓" : "추가되었습니다 ✓";
            setTimeout(()=>$("saveMsg").textContent="", 2500);
            resetForm(); loadCareers();
        });

        async function del(id){
            if (!confirm("이 이력을 삭제할까요?")) return;
            const { error } = await sb.from("careers").delete().eq("id", id);
            if (error) { alert("삭제 오류: " + error.message); return; }
            loadCareers();
        }
        $("refreshBtn").onclick = loadCareers;

        refreshSession();
    })();
    </script>
</body>
</html>
