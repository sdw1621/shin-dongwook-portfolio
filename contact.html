    <style>
        html { -webkit-font-smoothing: antialiased; }
        body { font-family: 'Pretendard', 'Inter', sans-serif; }

        /* 부드러운 등장 애니메이션 */
        .reveal { opacity: 0; transform: translateY(28px); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
        .reveal.show { opacity: 1; transform: none; }

        /* 그라데이션 텍스트 */
        .grad-text { background: linear-gradient(120deg,#2563eb 0%,#4f46e5 50%,#7c3aed 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

        /* 히어로 배경 블롭 */
        .blob { position:absolute; border-radius:9999px; filter: blur(64px); opacity:.45; z-index:0; animation: float 14s ease-in-out infinite; }
        @keyframes float { 0%,100%{ transform: translate(0,0) scale(1);} 50%{ transform: translate(20px,-24px) scale(1.08);} }

        /* 프로필 사진 글로우 링 */
        .photo-ring { background: conic-gradient(from 140deg,#2563eb,#7c3aed,#06b6d4,#2563eb); }

        /* 로고 월 타일 */
        .logo-tile { display:flex; align-items:center; justify-content:center; height:84px; padding:16px 18px; background:#fff; border:1px solid #eef0f2; border-radius:16px; transition: box-shadow .3s ease, transform .3s ease, border-color .3s ease; }
        .logo-tile img { max-height:34px; max-width:82%; object-fit:contain; filter: grayscale(1); opacity:.85; transition: filter .3s ease, opacity .3s ease; }
        .logo-tile:hover { box-shadow:0 14px 32px -14px rgba(15,23,42,.18); transform: translateY(-3px); border-color:#e2e8f0; }

    <script>
        // 부드러운 스크롤
        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', function (e) {
                const t = document.querySelector(this.getAttribute('href'));
                if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth' }); }
            });
        });

        // 스크롤 등장 애니메이션
        const io = new IntersectionObserver((entries) => {
            entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('show'); io.unobserve(en.target); } });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));

        // 네비 스크롤 시 그림자
        const nav = document.getElementById('nav');
        addEventListener('scroll', () => {
            nav.classList.toggle('shadow-sm', scrollY > 10);
